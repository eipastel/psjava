name: Release

# Dispara quando um PR é fechado no master. Só publica de fato se o PR foi
# MERGEADO e tinha a label "release" — mergeou com a label, libera a versão que
# está no package.json. Sem tag manual: o próprio workflow cria a tag v<versão>.
#
# Usa pull_request_target (e não pull_request) para que os secrets (NPM_TOKEN)
# fiquem disponíveis mesmo em PRs de forks. É seguro porque o checkout abaixo é
# sempre de "master" (código confiável já mergeado), nunca do head do PR, e o job
# só roda após o merge (merged == true).
#
# workflow_dispatch permite disparar a release manualmente quando necessário.
on:
  pull_request_target:
    types: [closed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # cria a tag e o GitHub Release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.repository == 'eipastel/psjava' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event.pull_request.merged == true &&
         contains(github.event.pull_request.labels.*.name, 'release'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Read version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Idempotência: se a tag v<versão> já existe, a versão já foi liberada — encerra.
      - name: Gate on tag
        id: gate
        run: |
          if git rev-parse "v${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.v.outputs.version }} já existe — nada a publicar."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # Pré-release (versão com "-") publica sob a própria dist-tag (ex: beta); estável vai pra latest.
      - name: Resolve dist-tag
        if: steps.gate.outputs.release == 'true'
        id: tag
        run: |
          VERSION=${{ steps.v.outputs.version }}
          if [[ "$VERSION" == *-* ]]; then
            TAG=$(echo "$VERSION" | sed -E 's/^[0-9.]+-([a-zA-Z]+).*/\1/')
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publicando $VERSION com dist-tag: $TAG"

      - name: Publish to npm
        if: steps.gate.outputs.release == 'true'
        run: npm publish --tag ${{ steps.tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Cria a tag v<versão> e o GitHub Release (notas geradas dos commits).
      # Pré-release entra marcado como pre-release, sem virar "Latest".
      - name: Tag and GitHub Release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.v.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"
          if [[ "$VERSION" == *-* ]]; then PRE=--prerelease; else PRE=--latest; fi
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes $PRE
