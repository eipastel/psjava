name: Dist-tag

# Move/cria uma dist-tag do npm sem precisar de OTP (usa NPM_TOKEN de automação).
# Útil porque a conta exige OTP no CLI local. Ex: promover uma beta para "latest".
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão alvo (ex: 0.0.1-beta.1)'
        required: true
      tag:
        description: 'Dist-tag a apontar (ex: latest)'
        required: true
        default: latest

permissions:
  contents: read

jobs:
  dist-tag:
    if: github.repository == 'eipastel/psjava'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Add dist-tag
        run: npm dist-tag add @thiagodiogo/psjava@${{ inputs.version }} ${{ inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
